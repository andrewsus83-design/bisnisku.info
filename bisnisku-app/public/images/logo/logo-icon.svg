<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Circular background — deep navy -->
  <circle cx="200" cy="200" r="200" fill="#0F172A"/>

  <!-- B letterform — white, clean geometric -->
  <!-- Vertical bar -->
  <rect x="108" y="80" width="30" height="240" rx="6" fill="white"/>

  <!-- Top horizontal + bump -->
  <rect x="108" y="80" width="60" height="30" rx="4" fill="white"/>
  <path d="M160 80 C200 80 220 100 220 120 C220 140 200 160 160 160 L138 160 L138 80 Z" fill="white"/>

  <!-- Bottom horizontal + bump (larger) -->
  <rect x="108" y="220" width="60" height="30" rx="4" fill="white"/>
  <path d="M160 200 C208 200 232 222 232 248 C232 274 208 296 160 296 L138 296 L138 200 Z" fill="white"/>

  <!-- Middle bar -->
  <rect x="108" y="160" width="55" height="40" fill="white"/>

  <!-- Yellow accent curves — outside the B bumps -->
  <path d="M218 90 C250 100 268 120 268 145 C268 170 248 185 220 188"
        stroke="#FFCC00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M220 210 C260 218 284 242 284 270 C284 298 258 316 224 318"
        stroke="#FFCC00" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Cursor arrow — Bisnisku signature element -->
  <g transform="translate(140, 130)">
    <polygon points="0,0 0,46 12,36 20,52 26,48 18,32 28,26" fill="#FFCC00"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="230" cy="100" r="5" fill="#FFCC00"/>
  <circle cx="248" cy="116" r="3.5" fill="#FFCC00"/>
  <circle cx="238" cy="88" r="2.8" fill="#FFCC00"/>
</svg>
