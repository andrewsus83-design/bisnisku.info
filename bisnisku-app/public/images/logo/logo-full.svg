<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Circular B mark -->
  <circle cx="40" cy="40" r="38" fill="#0F172A"/>

  <!-- B letterform — white, centered in circle -->
  <rect x="21" y="16" width="8" height="48" rx="2" fill="white"/>
  <rect x="21" y="16" width="16" height="8" rx="1.5" fill="white"/>
  <path d="M34 16 C48 16 56 22 56 30 C56 38 48 44 34 44 L29 44 L29 16 Z" fill="white"/>
  <rect x="21" y="44" width="16" height="9" fill="white"/>
  <path d="M34 40 C50 40 60 48 60 56 C60 64 50 72 34 72 L29 72 L29 40 Z" fill="white"/>
  <rect x="21" y="56" width="16" height="8" rx="1.5" fill="white"/>

  <!-- Yellow accent curves — outside B bumps -->
  <path d="M54 20 C63 24 68 30 68 37 C68 44 63 48 56 50"
        stroke="#FFCC00" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M56 44 C66 47 72 53 72 60 C72 67 66 72 58 73"
        stroke="#FFCC00" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Cursor arrow — Bisnisku signature -->
  <g transform="translate(30, 28)">
    <polygon points="0,0 0,13 3.5,10 5.5,15 7.5,14 5.5,9 8.5,7.5" fill="#FFCC00"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="57" cy="21" r="1.6" fill="#FFCC00"/>
  <circle cx="62" cy="26" r="1.2" fill="#FFCC00"/>
  <circle cx="59" cy="17" r="1" fill="#FFCC00"/>

  <!-- "bisnisku" text — Plus Jakarta Sans bold -->
  <text x="90" y="52" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="-0.5" fill="#0F172A">bisnisku</text>

  <!-- ".info" text — lighter weight, muted -->
  <text x="252" y="52" font-family="Plus Jakarta Sans, Inter, Arial, sans-serif" font-size="32" font-weight="500" letter-spacing="-0.5" fill="#64748B">.info</text>
</svg>
